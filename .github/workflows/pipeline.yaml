name: CI Pipeline

on:
  push:
    branches:
      - "*"

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run linter
        run: |
          echo "Running lint checks..."
          exit 0

  train:
    needs: linter
    runs-on: ubuntu-latest
    if: >
      needs.linter.result == 'success' &&
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run training
        run: |
          echo "Starting expensive GPU training..."
          exit 1

      - name: Generate error logs
        if: failure()
        run: echo "Training failed. Check logs." > error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Cleanup resources
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
